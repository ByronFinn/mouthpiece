<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 120px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #333;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid #eee;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .settings-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #999;
      padding: 0 4px;
    }
    .settings-btn:hover { color: #4A90D9; }
    .body { padding: 16px; }
    .mode-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
    }
    .preset-select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    .preset-select:focus { border-color: #4A90D9; }
    .checkbox-list {
      list-style: none;
    }
    .checkbox-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }
    .checkbox-list label {
      cursor: pointer;
      flex: 1;
    }
    .no-key {
      text-align: center;
      padding: 20px;
      color: #999;
    }
    .no-key a {
      color: #4A90D9;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Mouthpiece / 嘴替</h1>
    <button class="settings-btn" id="settings-btn">⚙</button>
  </div>
  <div class="body" id="popup-body"></div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
