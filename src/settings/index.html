<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Mouthpiece / 嘴替 — 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #333;
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    h1 { font-size: 20px; margin-bottom: 24px; }
    h2 { font-size: 16px; margin: 24px 0 12px; color: #4A90D9; border-bottom: 1px solid #eee; padding-bottom: 6px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
    input[type="text"], input[type="password"], input[type="number"], textarea, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { border-color: #4A90D9; }
    textarea { min-height: 120px; resize: vertical; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-primary { background: #4A90D9; color: white; }
    .btn-primary:hover { background: #3A7BC8; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }
    .btn-ghost { background: none; border: 1px solid #ddd; color: #666; }
    .btn-ghost:hover { border-color: #4A90D9; color: #4A90D9; }
    .preset-list { list-style: none; }
    .preset-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .preset-name { font-weight: 500; }
    .preset-builtin { font-size: 11px; color: #999; background: #f5f5f5; padding: 2px 6px; border-radius: 3px; margin-left: 6px; }
    .preset-actions { display: flex; gap: 6px; }
    .edit-form { margin-top: 12px; padding: 16px; background: #f8f9fa; border-radius: 8px; }
    .edit-form .form-group { margin-bottom: 12px; }
    .note { font-size: 12px; color: #999; margin-top: 4px; }
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #27ae60; color: white;
      padding: 10px 20px; border-radius: 6px;
      display: none; font-size: 14px;
    }
    .toast.visible { display: block; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h3 {
      margin-bottom: 16px;
    }
    .source-list {
      list-style: none;
      margin-bottom: 16px;
    }
    .source-list li {
      padding: 10px 12px;
      border: 1px solid #eee;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .source-list li:hover {
      background: #f0f4f8;
    }
  </style>
</head>
<body>
  <h1>⚙ Mouthpiece / 嘴替 设置</h1>
  <div id="settings-content"></div>
  <div class="toast" id="toast"></div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
